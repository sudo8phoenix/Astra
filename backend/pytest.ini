[pytest]
# Pytest configuration for Agent I Testing

# Test discovery
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers for organizing tests
markers =
    unit: Unit tests for individual modules
    integration: Integration tests for end-to-end workflows
    planning: Tests for planning module
    email: Tests for email functionality
    calendar: Tests for calendar functionality
    task: Tests for task management
    approval: Tests for approval workflow
    chat: Tests for chat interactions
    dashboard: Tests for dashboard widgets
    slow: Slow running tests
    requires_db: Tests requiring database
    requires_external_api: Tests requiring external APIs

# Test paths
testpaths = tests

# Coverage options
addopts = 
    --strict-markers
    --tb=short
    --verbose
    -ra

# Asyncio mode
asyncio_mode = auto

# Timeout for tests (30 seconds default)
timeout = 30
timeout_method = thread

# Log settings
log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Database
# Use in-memory SQLite for testing
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
